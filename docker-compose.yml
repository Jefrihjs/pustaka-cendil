services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pustaka_app
    environment:
      - PHP_VALUE=upload_max_filesize=20M post_max_size=20M upload_tmp_dir=/var/www/storage/framework/cache
      - TMPDIR=/var/www/storage/framework/cache
      - TEMP=/var/www/storage/framework/cache
      - TMP=/var/www/storage/framework/cache
    volumes:
      - .:/var/www
    networks:
      - pustaka_net

  node:
    image: node:20
    container_name: pustaka_node
    working_dir: /var/www
    volumes:
      - .:/var/www
    command: sh -c "npm install && npm run dev"
    ports:
      - "5173:5173"
    networks:
      - pustaka_net

  nginx:
    image: nginx:alpine
    container_name: pustaka_nginx
    ports:
      - "8000:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - pustaka_net

  mariadb:
    image: mariadb:11
    container_name: pustaka_mariadb
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: pustaka_cendil
      MYSQL_USER: pustaka
      MYSQL_PASSWORD: pustaka
    ports:
      - "3307:3306"
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - pustaka_net

networks:
  pustaka_net:

volumes:
  dbdata: